services:
  denodo-ai-sdk-chatbot:
    image: ${DENODO_AI_SDK_VERSION}
    container_name: ${DENODO_CHATBOT_AI_SDK_HOSTNAME}
    hostname: ${DENODO_CHATBOT_AI_SDK_HOSTNAME}
    depends_on:
      denodo-express:
        condition: service_healthy
    ports:
      - "${DENODO_CHATBOT_EXTERNAL_PORT}:9992"
      - "${DENODO_AI_SDK_EXTERNAL_PORT}:8008"
    environment:
      # AI SDK
      - AI_SDK_ROOT_PATH=${AI_SDK_ROOT_PATH}
      - AI_SDK_VER=${AI_SDK_VER}
      - VDB_NAMES=${DENODO_CHATBOT_SAMPLE_VDB_NAMES}
      - VECTOR_STORE=${VECTOR_STORE}
      - CUSTOM_INSTRUCTIONS=${CUSTOM_INSTRUCTIONS}
      - AI_SDK_DATA_CATALOG_URL=${INTERNAL_DATA_CATALOG_URL}
      - AI_SDK_DATA_MARKETPLACE_URL=${INTERNAL_DATA_CATALOG_URL}
      - LLM_PROVIDER=${PROVIDER}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS}
      - EMBEDDINGS_PROVIDER=${PROVIDER}
      - EMBEDDINGS_MODEL=${EMB_MODEL}
      - THINKING_LLM_PROVIDER=${THINKING_LLM_PROVIDER}
      - THINKING_LLM_MODEL=${THINKING_LLM_MODEL}
      - THINKING_LLM_TEMPERATURE=${THINKING_LLM_TEMPERATURE}
      - THINKING_LLM_MAX_TOKENS=${THINKING_LLM_MAX_TOKENS}
      # CHATBOT
      #- CHATBOT_ROOT_PATH=${CHATBOT_ROOT_PATH}
      - CHATBOT_DATA_CATALOG_URL=${EXTERNAL_DATA_CATALOG_URL}
      - CHATBOT_LLM_PROVIDER=${PROVIDER}
      - CHATBOT_LLM_MODEL=${LLM_MODEL}
      - CHATBOT_EMBEDDINGS_PROVIDER=${PROVIDER}
      - CHATBOT_EMBEDDINGS_MODEL=${EMB_MODEL}
      - CHATBOT_VECTOR_STORE_PROVIDER=${VECTOR_STORE}
      - CHATBOT_AUTO_GRAPH=1
      - AI_SDK_USERNAME=${SERVICE_ACCOUNT_USERNAME}
      - AI_SDK_PASSWORD=${SERVICE_ACCOUNT_PASSWORD}
      - AI_SDK_URL=http://localhost:8008
      # LLM CONFIGURATION
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_ORG_ID=${OPENAI_ORG_ID}
      - OPENAI_PROXY=${OPENAI_PROXY}
    networks:
      - denodo-net

  denodo-express:
    image: ${DENODO_VERSION}
    container_name: ${DENODO_CHATBOT_DENODO_VDP_HOSTNAME}
    hostname: ${DENODO_CHATBOT_DENODO_VDP_HOSTNAME}
    command: ["--vdpserver", "--designstudio", "--datacatalog"]
    ports:
      - "${DENODO_CHATBOT_VDP_EXTERNAL_WEB_PORT}:9090"
      - "${DENODO_CHATBOT_VDP_EXTERNAL_ARROWFLIGHTSQL_PORT}:9994"
      - "${DENODO_CHATBOT_VDP_EXTERNAL_ODBC_PORT}:9996"
      - "${DENODO_CHATBOT_VDP_EXTERNAL_JMX_PORT}:9997"
      - "${DENODO_CHATBOT_VDP_EXTERNAL_PORT}:9999"
    volumes:
      - "${DENODO_SA_LIC}:/opt/denodo/conf/denodo.lic"
    healthcheck:
      test: ["CMD", "/opt/denodo/bin/ping.sh", "-r", "-t", "5000", "//localhost:9999/admin"]
      interval: 20s
      timeout: 10s
      start_period: 300s
      start_interval: 300s
      retries: 3
    networks:
      - denodo-net

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: insight_user
      POSTGRES_PASSWORD: insight_password
      POSTGRES_DB: insight_corp
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - denodo-net

  crm-api:
    image: clue/json-server
    container_name: crm-api
    volumes:
      - ./api/db.json:/data/db.json
    ports:
      - "3000:80"
    networks:
      - denodo-net

networks:
  denodo-net:
    driver: bridge
